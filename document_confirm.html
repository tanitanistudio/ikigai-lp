  <body>

    <header class="hero">
      <div class="container">

    <section id="document" class="document confirm">
      <div class="container">
        <div class="ttl">資料請求（確認画面）</div>
        <div class="inner">
          <div class="txt">
            <div class="txt_1">
              以下の内容でよろしければ「送信する」ボタンをクリックしてください。
            </div>
          </div>
          <div class="confirm-table">
            <div class="form-group">
              <label>【貴社名】</label>
              <div class="d-txt" id="d-company"></div>
            </div>
            <div class="form-group">
              <label>【部署名】</label>
              <div class="d-txt" id="d-department"></div>
            </div>
            <div class="form-group">
              <label>【氏名】</label>
              <div class="d-txt" id="d-name"></div>
            </div>
            <div class="form-group">
              <label>【フリガナ】</label>
              <div class="d-txt" id="d-kana"></div>
            </div>
            <div class="form-group">
              <label>【電話番号】</label>
              <div class="d-txt" id="d-tel"></div>
            </div>
            <div class="form-group">
              <label>【メールアドレス】</label>
              <div class="d-txt" id="d-email"></div>
            </div>
            <div class="form-group">
              <label>【都道府県】</label>
              <div class="d-txt" id="d-pref"></div>
            </div>
            <div class="form-group">
              <label>【ご質問・ご相談内容】</label>
              <div class="d-txt" id="d-message"></div>
            </div>
            <div class="form-group">
              <label>【プライバシーポリシー】</label>
              <div class="d-txt" id="d-privacy"></div>
            </div>
          </div>
          <div class="btn-group">
            <button type="button" id="documentBackBtn" class="back-btn">
              戻る
            </button>
            <button type="button" id="documentSubmitBtn" class="submit-btn">
              送信する
            </button>
          </div>
        </div>
      </div>
    </section>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const submitBtn = document.getElementById('documentSubmitBtn');
        const backBtn = document.getElementById('documentBackBtn');
        const formId = '11747';
        const RECAPTCHA_SITE_KEY = '6LfWIVsqAAAAAKByx7i5wj2gpUj3E-kojfly7E-U';
        const thanksUrl = 'document-thanks.html';
        const apiUrl = `https://infodirect.co.jp/wp-json/contact-form-7/v1/contact-forms/${formId}/feedback`;

        function resetSubmitBtn() {
          submitBtn.disabled = false;
          submitBtn.textContent = '送信する';
        }

        function getRecaptchaToken() {
          return new Promise(function (resolve, reject) {
            if (typeof grecaptcha === 'undefined') {
              reject(new Error('reCAPTCHA not loaded'));
              return;
            }
            grecaptcha.ready(function () {
              grecaptcha
                .execute(RECAPTCHA_SITE_KEY, { action: 'document' })
                .then(resolve)
                .catch(reject);
            });
          });
        }

        function buildFormData() {
          const formData = new FormData();
          formData.append('_wpcf7', formId);
          formData.append('_wpcf7_unit_tag', 'wpcf7-f' + formId + '-o1');
          formData.append('_wpcf7_container_post', '0');
          formData.append('_wpcf7_locale', 'ja');
          formData.append('company', sessionStorage.getItem('company') || '');
          formData.append(
            'department',
            sessionStorage.getItem('department') || '',
          );
          formData.append(
            'your-name',
            sessionStorage.getItem('your-name') || '',
          );
          formData.append('kana', sessionStorage.getItem('kana') || '');
          formData.append('tel', sessionStorage.getItem('tel') || '');
          formData.append('email', sessionStorage.getItem('email') || '');
          formData.append('pref', sessionStorage.getItem('pref') || '');
          formData.append('message', sessionStorage.getItem('message') || '');
          formData.append('privacy', sessionStorage.getItem('privacy') || '');
          return formData;
        }

        function handleCf7Response(data) {
          if (data.status === 'mail_sent') {
            sessionStorage.clear();
            window.location.href = thanksUrl;
          } else if (data.status === 'spam') {
            alert(
              '送信がスパム判定されました。WordPress側のCF7スパム設定の確認が必要です。',
            );
            console.error('CF7 spam response:', data);
            resetSubmitBtn();
          } else if (data.invalid_fields && data.invalid_fields.length > 0) {
            const messages = data.invalid_fields
              .map(function (field) {
                return field.message;
              })
              .join('\n');
            alert('入力内容に問題があります。\n' + messages);
            resetSubmitBtn();
          } else {
            alert(
              '送信に失敗しました。（' + data.status + '）: ' + data.message,
            );
            resetSubmitBtn();
          }
        }

        document.getElementById('d-company').textContent =
          sessionStorage.getItem('company') || '（未入力）';
        document.getElementById('d-department').textContent =
          sessionStorage.getItem('department') || '（未入力）';
        document.getElementById('d-name').textContent =
          sessionStorage.getItem('your-name') || '（未入力）';
        document.getElementById('d-kana').textContent =
          sessionStorage.getItem('kana') || '（未入力）';
        document.getElementById('d-tel').textContent =
          sessionStorage.getItem('tel') || '（未入力）';
        document.getElementById('d-email').textContent =
          sessionStorage.getItem('email') || '（未入力）';
        document.getElementById('d-pref').textContent =
          sessionStorage.getItem('pref') || '（未入力）';
        document.getElementById('d-message').textContent =
          sessionStorage.getItem('message') || '（未入力）';
        document.getElementById('d-privacy').textContent =
          sessionStorage.getItem('privacy') === '同意'
            ? '同意する'
            : '（未同意）';

        if (backBtn) {
          backBtn.addEventListener('click', function () {
            history.back();
          });
        }

        if (submitBtn) {
          submitBtn.addEventListener('click', function () {
            submitBtn.disabled = true;
            submitBtn.textContent = '送信中...';

            getRecaptchaToken()
              .then(function (token) {
                const formData = buildFormData();
                formData.append('_wpcf7_recaptcha_response', token);

                return fetch(apiUrl, {
                  method: 'POST',
                  headers: { Accept: 'application/json' },
                  body: formData,
                });
              })
              .then(function (response) {
                return response.json();
              })
              .then(handleCf7Response)
              .catch(function (error) {
                console.error(error);
                alert(
                  '通信エラーが発生しました。reCAPTCHAの読み込みを確認してください。',
                );
                resetSubmitBtn();
              });
          });
        }
      });
    </script>
